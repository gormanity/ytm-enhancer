<h2>Precision Volume</h2>

<label class="toggle-row">
  <span>Volume</span>
  <input
    type="range"
    min="0"
    max="100"
    value="100"
    data-role="precision-volume-range"
  />
</label>

<label class="toggle-row">
  <input
    type="number"
    min="0"
    max="100"
    value="100"
    data-role="precision-volume-number"
  />
  <span>%</span>
</label>
