<h2>Notifications</h2>

<div class="settings-card">
  <label class="toggle-row">
    <span>Show on track change</span>
    <input type="checkbox" data-role="notifications-toggle" />
  </label>

  <label class="toggle-row">
    <span>Show on resume playback</span>
    <input type="checkbox" data-role="notifications-unpause-toggle" />
  </label>
</div>

<div class="settings-card">
  <h3>Display fields</h3>
  <div data-role="notifications-fields"></div>
</div>

<div class="settings-card">
  <button
    type="button"
    class="primary-btn primary-btn--block"
    data-role="notifications-preview-btn"
  >
    Preview Notification
  </button>
</div>
