<h2>Notifications</h2>

<div class="settings-card">
  <label class="card-row">
    <span>Show on track change</span>
    <input type="checkbox" data-role="notifications-toggle" />
  </label>

  <label class="card-row">
    <span>Show on resume playback</span>
    <input type="checkbox" data-role="notifications-unpause-toggle" />
  </label>
</div>

<div class="settings-card">
  <h3>Display fields</h3>
  <div data-role="notifications-fields">
    <label class="field-row">
      <span>Title</span>
      <input type="checkbox" data-role="notifications-field-title" />
    </label>
    <label class="field-row">
      <span>Artist</span>
      <input type="checkbox" data-role="notifications-field-artist" />
    </label>
    <label class="field-row">
      <span>Album</span>
      <input type="checkbox" data-role="notifications-field-album" />
    </label>
    <label class="field-row">
      <span>Year</span>
      <input type="checkbox" data-role="notifications-field-year" />
    </label>
    <label class="field-row">
      <span>Artwork</span>
      <input type="checkbox" data-role="notifications-field-artwork" />
    </label>
  </div>
</div>

<div class="settings-card">
  <button
    type="button"
    class="primary-btn primary-btn--block"
    data-role="notifications-preview-btn"
  >
    Preview Notification
  </button>
</div>

<div class="shortcuts-hint is-hidden" data-role="notifications-firefox-tip">
  <strong>Tip:</strong>
  Firefox does not support silent extension notifications. To mute the
  notification chime, disable notification sounds for Firefox at the operating
  system level.
</div>
