<h2>Mini Player</h2>

<div class="settings-card">
  <label class="card-row">
    <span>Enable mini player PiP button</span>
    <input type="checkbox" data-role="mini-player-enabled-toggle" />
  </label>

  <label class="card-row">
    <span>Suppress notifications while PiP is open</span>
    <input
      type="checkbox"
      data-role="mini-player-suppress-notifications-toggle"
    />
  </label>
</div>

<div class="shortcuts-hint" data-role="mini-player-resize-tip">
  <strong>Tip:</strong>
  Resize the PiP window to show just the track details and controls you want.
</div>

<div class="shortcuts-hint is-hidden" data-role="mini-player-document-pip-tip">
  <strong>Tip:</strong>
  Mini Player requires Document Picture-in-Picture support, but this browser
  does not support it yet.
</div>
