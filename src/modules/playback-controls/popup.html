<h2>Playback Controls</h2>

<div class="settings-card is-hidden" data-role="quick-tabs-card">
  <h3>Music Source</h3>
  <div class="tab-list-horizontal" data-role="quick-tabs-list"></div>
  <template data-role="quick-tab-item-template">
    <div class="tab-item">
      <img alt="" />
    </div>
  </template>
</div>

<div class="settings-card">
  <div class="quick-now-playing-track-info">
    <img
      class="quick-now-playing-artwork is-hidden"
      data-role="quick-now-playing-artwork"
      alt=""
    />
    <div class="quick-now-playing-meta">
      <div
        class="quick-now-playing-title"
        data-role="quick-now-playing-title"
      ></div>
      <div
        class="quick-now-playing-artist"
        data-role="quick-now-playing-artist"
      ></div>
      <div
        class="quick-now-playing-controls"
        data-role="quick-now-playing-controls"
      >
        <button
          class="icon-btn"
          data-role="quick-now-playing-prev"
          type="button"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
          </svg>
        </button>
        <button
          class="icon-btn quick-now-playing-btn-padded"
          data-role="quick-now-playing-play"
          type="button"
        >
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>
        <button
          class="icon-btn"
          data-role="quick-now-playing-next"
          type="button"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
      </div>
      <div
        class="quick-now-playing-progress is-hidden"
        data-role="quick-now-playing-progress"
      ></div>
    </div>
  </div>
</div>

<div class="settings-card">
  <h3>Quick Settings</h3>

  <div class="volume-group">
    <div class="quick-volume-wrapper">
      <div class="quick-volume-label-row">
        <span class="quick-volume-label">Volume</span>
        <div class="quick-volume-input-group">
          <input
            type="number"
            min="0"
            max="100"
            class="volume-number-input"
            data-role="quick-volume-number-input"
          />
          <span
            class="quick-volume-placeholder"
            data-role="quick-volume-placeholder"
            >-</span
          >
          <span class="quick-volume-percent">%</span>
        </div>
      </div>
      <input
        type="range"
        min="0"
        max="100"
        value="0"
        data-role="quick-volume-range"
      />
    </div>
  </div>

  <div class="playback-controls-inline-row">
    <div class="compact-select-group" data-role="quick-speed-slot"></div>
    <div class="compact-select-group" data-role="quick-quality-slot"></div>
  </div>
</div>
