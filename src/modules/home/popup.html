<h2>Now Playing</h2>

<div class="home-track-info">
  <img class="home-artwork" alt="" data-role="artwork" />
  <div class="home-track-title" data-role="title"></div>
  <div class="home-track-artist" data-role="artist"></div>
</div>

<div class="home-controls">
  <button class="home-control-btn" data-role="previous" type="button">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
    </svg>
  </button>
  <button
    class="home-control-btn home-control-btn--primary"
    data-role="toggle-play"
    type="button"
  >
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M8 5v14l11-7z" />
    </svg>
  </button>
  <button class="home-control-btn" data-role="next" type="button">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
    </svg>
  </button>
</div>
