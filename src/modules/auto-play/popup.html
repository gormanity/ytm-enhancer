<h2>Auto-Play</h2>

<div class="settings-card">
  <label class="card-row auto-play-mode-row" data-role="auto-play-mode-row">
    <span>On page load</span>
    <select data-role="auto-play-mode">
      <option value="default">Default</option>
      <option value="off">Off</option>
      <option value="on">On</option>
    </select>
  </label>
  <p
    class="status-hint status-warning is-hidden"
    data-role="auto-play-browser-blocked"
  >
    Firefox is blocking autoplay for YouTube Music. Allow autoplay for
    music.youtube.com in Firefox site permissions.
  </p>
</div>
