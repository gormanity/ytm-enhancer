<h2>Keyboard Shortcuts</h2>

<div class="settings-card">
  <div class="shortcuts-list" data-role="shortcuts-list"></div>
  <template data-role="shortcut-row-template">
    <div class="shortcut-row">
      <span class="shortcut-label"></span>
      <div class="shortcut-row-right">
        <div class="shortcut-display" data-role="shortcut-display">
          <div class="shortcut-keys"></div>
          <div class="shortcut-actions is-hidden" data-role="shortcut-actions">
            <button
              type="button"
              class="shortcut-action-btn"
              data-role="shortcut-edit-btn"
              title="Edit shortcut"
            >
              Edit
            </button>
            <button
              type="button"
              class="shortcut-action-btn"
              data-role="shortcut-reset-btn"
              title="Reset to default"
            >
              Reset
            </button>
          </div>
        </div>
        <div class="shortcut-edit is-hidden" data-role="shortcut-edit-mode">
          <span class="shortcut-edit-prompt">Press a shortcut…</span>
          <button
            type="button"
            class="shortcut-action-btn"
            data-role="shortcut-cancel-btn"
            title="Cancel"
          >
            Cancel
          </button>
        </div>
        <div class="shortcut-error is-hidden" data-role="shortcut-error"></div>
      </div>
    </div>
  </template>
  <template data-role="shortcut-key-template">
    <kbd class="shortcut-key"></kbd>
  </template>
  <template data-role="shortcut-separator-template">
    <span class="shortcut-separator">+</span>
  </template>

  <div class="panel-actions" data-role="configure-shortcuts-actions">
    <button
      class="primary-btn primary-btn--block"
      data-role="configure-shortcuts"
      type="button"
    >
      Configure Shortcuts
    </button>
  </div>
</div>

<div class="shortcuts-hint" data-role="shortcuts-global-tip">
  <strong>Tip:</strong>
  Set shortcuts to <strong>Global</strong> in browser settings to control
  playback while using other apps.
</div>
