<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YTM Enhancer</title>
    <style>
      :root {
        --bg-color: #030303;
        --sidebar-bg: #0f0f0f;
        --text-color: #ffffff;
        --text-secondary: #aaaaaa;
        --accent-color: #ff0000;
        --border-color: #2a2a2a;
        --hover-bg: #272727;
        --active-bg: #3f3f3f;
      }

      html,
      body {
        width: 480px;
        height: 460px;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Roboto", "Arial", sans-serif;
        font-size: 14px;
        color: var(--text-color);
        background: var(--bg-color);
        overflow: hidden;
      }

      #app-shell {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
      }

      #sidebar {
        min-height: 0;
        box-sizing: border-box;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding-top: 12px;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 0 16px 16px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 12px;
      }

      .sidebar-header h1 {
        font-size: 14px;
        margin: 0;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        cursor: pointer;
        color: var(--text-secondary);
        transition:
          background 0.2s,
          color 0.2s;
        gap: 12px;
        border-radius: 0 20px 20px 0;
        margin-right: 8px;
        user-select: none;
      }

      .nav-item:hover {
        background: var(--hover-bg);
        color: var(--text-color);
      }

      .nav-item.active {
        background: var(--active-bg);
        color: var(--text-color);
        font-weight: 500;
      }

      .nav-item svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }

      #nav-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .version-label {
        font-size: 11px;
        color: var(--text-secondary);
        opacity: 0.6;
      }

      #main-content {
        box-sizing: border-box;
        min-height: 0;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
      }

      h2 {
        font-size: 20px;
        margin: 0 0 20px;
        font-weight: 500;
      }

      h3 {
        font-size: 12px;
        margin: 24px 0 12px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .settings-card {
        background: #0f0f0f;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .settings-card h3 {
        margin-top: 0;
      }

      .settings-card > :first-child {
        margin-top: 0;
      }

      .settings-card > :last-child {
        margin-bottom: 0;
      }

      .volume-group {
        margin-top: 8px;
      }

      .volume-number-input {
        background: transparent !important;
        border: none !important;
        color: var(--text-color) !important;
        font-size: 14px !important;
        font-weight: 600;
        text-align: right;
        padding: 0 !important;
        width: 38px !important;
        outline: none;
      }

      .compact-select-group .toggle-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
        padding: 0;
        border-bottom: none;
      }

      .compact-select-group select {
        width: 100%;
      }

      .status-hint {
        font-size: 11px;
        color: var(--text-secondary);
        opacity: 0.7;
        margin-top: 8px;
        line-height: 1.4;
      }

      .tab-list-horizontal {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .tab-item {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition:
          border-color 0.2s,
          transform 0.1s;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tab-item:hover {
        transform: scale(1.05);
      }

      .tab-item.selected {
        border-color: var(--accent-color);
      }

      .tab-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Module Specific Styles */
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        cursor: pointer;
        border-bottom: 1px solid var(--border-color);
      }

      .settings-card > .toggle-row:first-child,
      .settings-card > .field-row:first-child,
      .settings-card > .shortcut-row:first-child {
        padding-top: 0;
      }

      .settings-card > .toggle-row:last-child,
      .settings-card > .field-row:last-child,
      .settings-card > .shortcut-row:last-child {
        padding-bottom: 0;
        border-bottom: none;
      }

      .toggle-row:last-child {
        border-bottom: none;
      }

      .toggle-row span {
        font-size: 14px;
      }

      .field-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        cursor: pointer;
      }

      .field-row span {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .shortcuts-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .shortcut-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--border-color);
      }

      .shortcut-label {
        color: var(--text-secondary);
        font-size: 13px;
      }

      .shortcut-key {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid #444;
        color: #eee;
        box-shadow: 0 2px 0 #111;
        min-width: 20px;
        text-align: center;
        display: inline-block;
      }

      .key-symbol {
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        font-family: "Arial", sans-serif;
      }

      .shortcuts-hint {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.6;
        padding-left: 12px;
        border-left: 2px solid var(--accent-color);
      }

      .primary-btn {
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .primary-btn:hover {
        background: #cc0000 !important;
      }

      .primary-btn:active {
        transform: scale(0.98);
      }

      .secondary-btn {
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .secondary-btn:hover {
        background: #4f4f4f !important;
      }

      .secondary-btn:active {
        transform: scale(0.98);
      }

      .shortcuts-hint strong {
        color: var(--text-color);
      }

      input[type="checkbox"] {
        appearance: none;
        width: 32px;
        height: 18px;
        background: #3f3f3f;
        border-radius: 9px;
        position: relative;
        cursor: pointer;
        transition: background 0.3s;
        flex-shrink: 0;
      }

      input[type="checkbox"]:checked {
        background: var(--accent-color);
      }

      input[type="checkbox"]::before {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform 0.3s;
      }

      input[type="checkbox"]:checked::before {
        transform: translateX(14px);
      }

      input[type="checkbox"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input[type="range"] {
        accent-color: var(--accent-color);
        width: 100%;
        margin: 12px 0;
        cursor: pointer;
        height: 6px;
        background: #3f3f3f;
        border-radius: 3px;
        appearance: none;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        background: var(--text-color);
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }

      input[type="range"]:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      input[type="range"]:disabled::-webkit-slider-thumb {
        width: 0;
        height: 0;
      }

      input[type="range"]:disabled::-moz-range-thumb {
        width: 0;
        height: 0;
      }

      input[type="number"] {
        background: #1a1a1a;
        border: 1px solid var(--border-color);
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        width: 50px;
      }

      select {
        background: #1a1a1a;
        border: 1px solid var(--border-color);
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        outline: none;
      }

      select:focus {
        border-color: var(--active-bg);
      }

      .icon-btn {
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition:
          background 0.2s,
          transform 0.1s;
        outline: none;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .icon-btn:active {
        transform: scale(0.95);
      }

      /* Custom scrollbar */
      #main-content::-webkit-scrollbar {
        width: 8px;
      }

      #main-content::-webkit-scrollbar-track {
        background: transparent;
      }

      #main-content::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }

      #main-content::-webkit-scrollbar-thumb:hover {
        background: var(--active-bg);
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar">
        <div class="sidebar-header">
          <h1>YTM Enhancer</h1>
        </div>
        <nav id="nav-list"></nav>
      </aside>
      <main id="main-content">
        <div id="view-container"></div>
      </main>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
