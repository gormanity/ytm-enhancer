<h2>Connected Apps</h2>

<p class="status-hint connected-apps-intro">
  Connect approved external apps to YTM Enhancer without giving them direct
  access to YouTube Music pages.
</p>

<div class="settings-card">
  <label class="card-row">
    <span class="card-row-copy">
      <span>Enable Connected Apps</span>
      <small class="status-hint">
        Allow approved external apps to connect to YTM Enhancer.
      </small>
    </span>
    <input type="checkbox" data-role="connected-apps-enabled-toggle" />
  </label>
</div>

<div data-role="connected-apps-list"></div>

<div
  class="settings-card connected-apps-empty"
  data-role="connected-apps-empty"
>
  <p class="status-hint">No connected apps registered yet.</p>
</div>

<template data-role="connected-app-template">
  <details class="settings-card connected-app-card">
    <summary class="connected-app-summary-row">
      <div class="connected-app-title-group">
        <span class="connected-app-title-line">
          <h3 data-role="connected-app-name"></h3>
          <span
            class="connected-app-status"
            data-role="connected-app-status"
          ></span>
        </span>
        <span
          class="status-hint connected-app-summary"
          data-role="connected-app-summary"
        ></span>
      </div>
      <span class="connected-app-expand-icon" aria-hidden="true"></span>
    </summary>

    <div class="connected-app-details">
      <p
        class="status-hint connected-app-guidance"
        data-role="connected-app-guidance"
      ></p>

      <p
        class="status-hint connected-app-version"
        data-role="connected-app-version"
      ></p>

      <div class="connected-app-section">
        <h3>Shared by YTM Enhancer</h3>
        <ul
          class="connected-app-shared-list"
          data-role="connected-app-shared-list"
        ></ul>
      </div>

      <div class="connected-app-actions">
        <a
          class="secondary-btn connected-app-action connected-app-install-link is-hidden"
          data-role="connected-app-install-link"
          href="https://gormanity.github.io/ytm-enhancer/menu-bar/install.html"
          target="_blank"
          rel="noreferrer"
        >
          Download for macOS
        </a>
        <button
          type="button"
          class="secondary-btn connected-app-action connected-app-lifecycle-button is-hidden"
          data-role="connected-app-lifecycle-button"
        >
          Disable App
        </button>
        <button
          type="button"
          class="secondary-btn connected-app-action connected-app-uninstall-button is-hidden"
          data-role="connected-app-uninstall-button"
        >
          Uninstall App
        </button>
      </div>

      <p
        class="status-hint connected-app-uninstall-status is-hidden"
        data-role="connected-app-uninstall-status"
      ></p>
    </div>
  </details>
</template>
