<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YTM fixture: player loaded paused</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }

      #play-pause-button,
      .next-button,
      .previous-button,
      .repeat,
      .shuffle,
      #page-play {
        display: block;
        width: 48px;
        height: 48px;
        margin: 16px;
      }

      #progress-bar {
        display: block;
        width: 320px;
        margin: 16px;
      }
    </style>
  </head>
  <body>
    <!--
      Synthetic fixture modeled after YouTube Music with a loaded, paused
      player bar. Keep this hand-reduced and adapter-contract focused.
    -->
    <section data-fixture="player-bar">
      <tp-yt-paper-icon-button
        id="play-pause-button"
        title="Play"
      ></tp-yt-paper-icon-button>
      <button class="previous-button" type="button"></button>
      <button class="next-button" type="button"></button>
      <button class="shuffle" type="button" aria-pressed="false">
        <iron-icon
          icon="yt-icons:shuffle"
          style="color: rgb(132, 132, 138)"
        ></iron-icon>
      </button>
      <button
        class="repeat"
        type="button"
        aria-label="Repeat off"
        aria-pressed="false"
        title="Repeat off"
      >
        <iron-icon
          icon="yt-icons:repeat"
          style="color: rgb(132, 132, 138)"
        ></iron-icon>
      </button>
      <yt-formatted-string class="title style-scope ytmusic-player-bar">
        A Walk
      </yt-formatted-string>
      <span class="subtitle style-scope ytmusic-player-bar">
        <yt-formatted-string>
          <a href="/channel/fixture">Tycho</a>
          <a href="/browse/MPREb_fixture">Dive</a>
          <span>2011</span>
        </yt-formatted-string>
      </span>
      <div class="thumbnail-image-wrapper style-scope ytmusic-player-bar">
        <img
          class="image"
          alt=""
          src="https://lh3.googleusercontent.com/ytm-enhancer-fixture=w226-h226-l90-rj"
        />
      </div>
      <span id="time-info">1:23 / 4:56</span>
      <input id="progress-bar" max="296" min="0" type="range" value="83" />
      <video class="html5-main-video"></video>
      <ytmusic-player-queue-item selected>
        <img
          class="image"
          alt=""
          src="https://lh3.googleusercontent.com/ytm-enhancer-fixture=w226-h226-l90-rj"
        />
        <yt-formatted-string class="song-title">A Walk</yt-formatted-string>
        <yt-formatted-string class="byline">
          <a href="/channel/fixture">Tycho</a>
          <a href="/browse/MPREb_fixture">Dive</a>
        </yt-formatted-string>
      </ytmusic-player-queue-item>
      <ytmusic-player-queue-item>
        <img
          class="image"
          alt=""
          src="https://lh3.googleusercontent.com/ytm-enhancer-next-fixture=w226-h226-l90-rj"
        />
        <yt-formatted-string class="song-title">
          Send And Receive
        </yt-formatted-string>
        <yt-formatted-string class="byline">
          <a href="/channel/fixture">Tycho</a>
        </yt-formatted-string>
      </ytmusic-player-queue-item>
    </section>

    <main>
      <ytmusic-play-button-renderer data-fixture="playlist-header-play">
        <button aria-label="Play Album" id="page-play" type="button"></button>
      </ytmusic-play-button-renderer>
    </main>

    <script>
      window.__ytmTestEvents = [];
      window.addEventListener("focus", () => {
        window.__ytmTestEvents.push("window-focused");
      });
      const playPauseButton = document.querySelector("#play-pause-button");
      const progressBar = document.querySelector("#progress-bar");
      const timeInfo = document.querySelector("#time-info");
      const video = document.querySelector("video.html5-main-video");
      let progressTimer = null;

      function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return `${minutes}:${seconds}`;
      }

      function publishMediaUpdate(eventName = "timeupdate") {
        video.dispatchEvent(new Event(eventName));
        if (eventName !== "timeupdate") {
          video.dispatchEvent(new Event("timeupdate"));
        }
      }

      function advanceProgress() {
        const max = Number(progressBar.max);
        const current = Number(progressBar.value);
        const next = Math.min(max, current + 1);
        progressBar.value = String(next);
        timeInfo.textContent = `${formatTime(next)} / ${formatTime(max)}`;
        publishMediaUpdate();
      }

      function startProgressUpdates() {
        if (progressTimer !== null) return;
        progressTimer = window.setInterval(advanceProgress, 1000);
      }

      playPauseButton.addEventListener("click", () => {
        playPauseButton.setAttribute("title", "Pause");
        playPauseButton.setAttribute("aria-label", "Pause");
        startProgressUpdates();
        advanceProgress();
        publishMediaUpdate("play");
        window.__ytmTestEvents.push("player-play-clicked");
        window.__ytmTestEvents.push("player-play-pause-clicked");
      });
      document
        .querySelector(".previous-button")
        .addEventListener("click", () => {
          window.__ytmTestEvents.push("previous-clicked");
        });
      document.querySelector(".next-button").addEventListener("click", () => {
        window.__ytmTestEvents.push("next-clicked");
      });
      document.querySelector(".shuffle").addEventListener("click", (event) => {
        const button = event.currentTarget;
        const icon = button.querySelector("iron-icon");
        const isPressed = button.getAttribute("aria-pressed") === "true";
        button.setAttribute("aria-pressed", isPressed ? "false" : "true");
        icon.style.color = isPressed
          ? "rgb(132, 132, 138)"
          : "rgb(255, 255, 255)";
        window.__ytmTestEvents.push("shuffle-clicked");
      });

      const repeatModes = [
        {
          label: "Repeat off",
          icon: "yt-icons:repeat",
          pressed: "false",
          color: "rgb(132, 132, 138)",
        },
        {
          label: "Repeat all",
          icon: "yt-icons:repeat",
          pressed: "true",
          color: "rgb(255, 255, 255)",
        },
        {
          label: "Repeat one",
          icon: "yt-icons:repeat-one",
          pressed: "true",
          color: "rgb(255, 255, 255)",
        },
      ];
      let repeatModeIndex = 0;
      function renderRepeatMode() {
        const button = document.querySelector(".repeat");
        const icon = button.querySelector("iron-icon");
        const mode = repeatModes[repeatModeIndex];
        button.setAttribute("aria-label", mode.label);
        button.setAttribute("aria-pressed", mode.pressed);
        button.setAttribute("title", mode.label);
        icon.setAttribute("icon", mode.icon);
        icon.style.color = mode.color;
      }
      document.querySelector(".repeat").addEventListener("click", () => {
        repeatModeIndex = (repeatModeIndex + 1) % repeatModes.length;
        renderRepeatMode();
        window.__ytmTestEvents.push("repeat-clicked");
      });

      document.querySelector("#progress-bar").addEventListener("input", () => {
        window.__ytmTestEvents.push(
          `seek-input:${document.querySelector("#progress-bar").value}`,
        );
      });
      document.querySelector("#progress-bar").addEventListener("change", () => {
        window.__ytmTestEvents.push(
          `seek-change:${document.querySelector("#progress-bar").value}`,
        );
      });
      document.querySelector("#page-play").addEventListener("click", () => {
        window.__ytmTestEvents.push("page-play-clicked");
      });
    </script>
  </body>
</html>
