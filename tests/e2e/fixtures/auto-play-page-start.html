<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YTM fixture: auto play page start</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }

      #play-pause-button {
        display: none;
      }

      #page-play {
        display: block;
        width: 72px;
        height: 72px;
        margin: 96px;
      }
    </style>
  </head>
  <body>
    <!--
      Synthetic fixture modeled after an unstarted page where Auto Play should
      activate the page-level play button before media exists.
    -->
    <tp-yt-paper-icon-button id="play-pause-button"></tp-yt-paper-icon-button>

    <main>
      <ytmusic-play-button-renderer data-fixture="playlist-header-play">
        <button aria-label="Play Album" id="page-play" type="button"></button>
      </ytmusic-play-button-renderer>
    </main>

    <script>
      window.__ytmTestEvents = [];
      document.querySelector("#page-play").addEventListener("click", () => {
        window.__ytmTestEvents.push("page-play-clicked");
      });
    </script>
  </body>
</html>
