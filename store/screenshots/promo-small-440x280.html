<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=440" />
    <title>YTM Enhancer — Small Promo Tile</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 440px;
        height: 280px;
        overflow: hidden;
      }
      body {
        font-family: "Roboto", "Arial", sans-serif;
        background: #030303;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Radial glow behind icon */
      .glow {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(51, 255, 255, 0.08) 0%,
          rgba(119, 51, 255, 0.06) 40%,
          transparent 70%
        );
        border-radius: 50%;
        filter: blur(20px);
      }

      /* Icon */
      .icon-wrap {
        position: relative;
        z-index: 1;
        width: 72px;
        height: 72px;
        margin-bottom: 16px;
      }
      .icon-wrap svg {
        width: 100%;
        height: 100%;
      }

      /* Title */
      .title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
      }

      /* Tagline */
      .tagline {
        font-size: 14px;
        color: #aaa;
        margin-top: 6px;
        position: relative;
        z-index: 1;
      }

      /* Feature icon strip */
      .feature-strip {
        display: flex;
        gap: 24px;
        margin-top: 24px;
        position: relative;
        z-index: 1;
      }
      .feature-icon {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.5;
      }
      .feature-icon svg {
        width: 22px;
        height: 22px;
        stroke: #fff;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Subtle bottom accent line */
      .accent-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          #ff0000 30%,
          #ff0000 70%,
          transparent 100%
        );
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <div class="icon-wrap">
      <svg viewBox="0 0 128 128">
        <defs>
          <linearGradient
            id="disc"
            x1="32"
            y1="32"
            x2="96"
            y2="96"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0%" stop-color="#F03030" />
            <stop offset="100%" stop-color="#C41010" />
          </linearGradient>
          <clipPath id="boundary"><circle cx="64" cy="64" r="63" /></clipPath>
          <filter id="glow-f" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <circle cx="64" cy="64" r="63" fill="#0A0A16" />
        <g
          stroke-width="1.8"
          stroke-linecap="round"
          fill="none"
          clip-path="url(#boundary)"
          filter="url(#glow-f)"
        >
          <line x1="64.0" y1="23.0" x2="64.0" y2="12.0" stroke="#33ffff" />
          <line x1="72.5" y1="23.9" x2="76.1" y2="7.3" stroke="#33edff" />
          <line x1="80.7" y1="26.5" x2="89.2" y2="7.4" stroke="#33dbff" />
          <line x1="88.1" y1="30.8" x2="96.9" y2="18.7" stroke="#33c9ff" />
          <line x1="94.5" y1="36.6" x2="108.6" y2="23.9" stroke="#33b6ff" />
          <line x1="99.5" y1="43.5" x2="110.8" y2="37.0" stroke="#33a4ff" />
          <line x1="103.0" y1="51.3" x2="110.6" y2="48.9" stroke="#3392ff" />
          <line x1="104.8" y1="59.7" x2="109.7" y2="59.2" stroke="#3380ff" />
          <line x1="105.0" y1="64.0" x2="125.0" y2="64.0" stroke="#3377ff" />
          <line x1="104.1" y1="72.5" x2="117.8" y2="75.4" stroke="#3365ff" />
          <line x1="101.5" y1="80.7" x2="107.9" y2="83.5" stroke="#3353ff" />
          <line x1="97.2" y1="88.1" x2="100.4" y2="90.5" stroke="#3341ff" />
          <line x1="91.4" y1="94.5" x2="97.5" y2="101.2" stroke="#3833ff" />
          <line x1="84.5" y1="99.5" x2="87.5" y2="104.7" stroke="#4a33ff" />
          <line x1="76.7" y1="103.0" x2="80.1" y2="113.5" stroke="#5c33ff" />
          <line x1="68.3" y1="104.8" x2="68.8" y2="109.7" stroke="#6e33ff" />
          <line x1="64.0" y1="105.0" x2="64.0" y2="122.0" stroke="#7733ff" />
          <line x1="55.5" y1="104.1" x2="52.8" y2="116.8" stroke="#8933ff" />
          <line x1="47.3" y1="101.5" x2="44.5" y2="107.9" stroke="#9b33ff" />
          <line x1="39.9" y1="97.2" x2="34.0" y2="105.3" stroke="#ad33ff" />
          <line x1="33.5" y1="91.4" x2="29.1" y2="95.4" stroke="#c033ff" />
          <line x1="28.5" y1="84.5" x2="25.0" y2="86.5" stroke="#d233ff" />
          <line x1="25.0" y1="76.7" x2="16.4" y2="79.5" stroke="#e433ff" />
          <line x1="23.2" y1="68.3" x2="16.3" y2="69.0" stroke="#f633ff" />
          <line x1="23.0" y1="64.0" x2="2.0" y2="64.0" stroke="#ff33ff" />
          <line x1="23.9" y1="55.5" x2="6.3" y2="51.7" stroke="#ff33ed" />
          <line x1="26.5" y1="47.3" x2="5.5" y2="38.0" stroke="#ff33db" />
          <line x1="30.8" y1="39.9" x2="20.3" y2="32.3" stroke="#ff33c9" />
          <line x1="36.6" y1="33.5" x2="23.2" y2="18.7" stroke="#ff33b6" />
          <line x1="43.5" y1="28.5" x2="35.0" y2="13.8" stroke="#ff33a4" />
          <line x1="51.3" y1="25.0" x2="46.4" y2="9.8" stroke="#ff3392" />
          <line x1="59.7" y1="23.2" x2="57.7" y2="4.3" stroke="#ff3380" />
        </g>
        <circle
          cx="64"
          cy="64"
          r="41"
          fill="none"
          stroke="#FFFFFF"
          stroke-opacity="0.12"
          stroke-width="1"
        />
        <circle cx="64" cy="64" r="39" fill="url(#disc)" />
        <polygon points="54,45 54,83 82,64" fill="#FFFFFF" />
      </svg>
    </div>

    <div class="title">YTM Enhancer</div>
    <div class="tagline">Supercharge YouTube Music</div>

    <div class="feature-strip">
      <!-- Mini Player -->
      <div class="feature-icon">
        <svg viewBox="0 0 24 24">
          <rect width="18" height="18" x="3" y="3" rx="2" />
          <path d="M21 15V5a2 2 0 0 0-2-2H9" />
          <path d="M21 9H12a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9" />
        </svg>
      </div>
      <!-- Visualizer -->
      <div class="feature-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 20v-8" />
          <path d="M18 20V10" />
          <path d="M6 20V4" />
        </svg>
      </div>
      <!-- Hotkeys -->
      <div class="feature-icon">
        <svg viewBox="0 0 24 24">
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="M6 8h.01" />
          <path d="M10 8h.01" />
          <path d="M14 8h.01" />
          <path d="M18 8h.01" />
          <path d="M8 16h8" />
        </svg>
      </div>
      <!-- Sleep Timer -->
      <div class="feature-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="13" r="8" />
          <path d="M12 9v4l2 2" />
          <path d="M5 3 2 6" />
          <path d="m22 6-3-3" />
        </svg>
      </div>
      <!-- Notifications -->
      <div class="feature-icon">
        <svg viewBox="0 0 24 24">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
      </div>
    </div>

    <div class="accent-line"></div>
  </body>
</html>
