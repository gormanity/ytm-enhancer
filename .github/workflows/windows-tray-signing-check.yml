name: Windows Tray Signing Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signing-check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Windows tray tests
        shell: pwsh
        run: |
          pnpm exec vitest run tests/apps/windows-tray-scaffold.test.ts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm run windows-tray:test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare beta self-signed certificate
        shell: pwsh
        run: |
          & ./scripts/ci/prepare-windows-tray-codesign.ps1

      - name: Build signed release packages
        shell: pwsh
        env:
          YTM_WINDOWS_TRAY_CODESIGN_REQUIRED: "1"
        run: |
          pnpm run windows-tray:package:win-x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm run windows-tray:package:win-arm64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm run windows-tray:update-manifest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          & ./scripts/ci/remove-windows-tray-codesign.ps1
