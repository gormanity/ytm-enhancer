name: Windows Tray Release

on:
  push:
    tags:
      - "windows-tray-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Windows tray release version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace "^windows-tray-v", ""
          if ($version -notmatch "^[0-9]+\.[0-9]+\.[0-9]+$") {
            Write-Error "Windows tray releases must use windows-tray-vX.Y.Z tags."
            exit 1
          }

          $parts = $version.Split(".")
          $buildNumber = ([int] $parts[0] * 1000000) +
            ([int] $parts[1] * 1000) +
            [int] $parts[2]
          $previousTag = git tag -l "windows-tray-v[0-9]*" --sort=-v:refname |
            Where-Object { $_ -ne $env:GITHUB_REF_NAME } |
            Select-Object -First 1

          "YTM_WINDOWS_TRAY_VERSION=$version" |
            Out-File -FilePath $env:GITHUB_ENV -Append
          "YTM_WINDOWS_TRAY_BUILD_NUMBER=$buildNumber" |
            Out-File -FilePath $env:GITHUB_ENV -Append
          "PREVIOUS_WINDOWS_TRAY_TAG=$previousTag" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run Windows tray tests
        run: |
          pnpm exec vitest run tests/apps/windows-tray-scaffold.test.ts
          pnpm run windows-tray:test

      - name: Prepare signing certificate
        shell: pwsh
        env:
          WINDOWS_TRAY_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_TRAY_CODESIGN_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TRAY_CODESIGN_PFX_BASE64)) {
            Write-Error "Windows tray release signing is required. Configure WINDOWS_TRAY_CODESIGN_PFX_BASE64 before pushing a windows-tray-v* tag."
            exit 1
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-tray-codesign.pfx"
          try {
            $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_TRAY_CODESIGN_PFX_BASE64)
          } catch {
            Write-Error "WINDOWS_TRAY_CODESIGN_PFX_BASE64 is not valid base64."
            exit 1
          }

          [IO.File]::WriteAllBytes(
            $certificatePath,
            $certificateBytes
          )
          "YTM_WINDOWS_TRAY_CODESIGN_CERTIFICATE_PATH=$certificatePath" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release packages
        shell: pwsh
        env:
          YTM_WINDOWS_TRAY_CODESIGN_REQUIRED: "1"
          YTM_WINDOWS_TRAY_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_TRAY_CODESIGN_PASSWORD }}
          YTM_WINDOWS_TRAY_CODESIGN_TIMESTAMP_URL: http://timestamp.digicert.com
        run: |
          pnpm run windows-tray:package:win-x64
          pnpm run windows-tray:package:win-arm64
          $version = $env:YTM_WINDOWS_TRAY_VERSION
          pnpm run windows-tray:update-manifest -- `
            "--package=apps/windows-tray/.build/packages/YTM-Tray-$version-win-x64.zip" `
            "--package=apps/windows-tray/.build/packages/YTM-Tray-$version-win-arm64.zip"

      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          if (
            -not [string]::IsNullOrWhiteSpace($env:YTM_WINDOWS_TRAY_CODESIGN_CERTIFICATE_PATH) -and
            (Test-Path -LiteralPath $env:YTM_WINDOWS_TRAY_CODESIGN_CERTIFICATE_PATH)
          ) {
            Remove-Item -LiteralPath $env:YTM_WINDOWS_TRAY_CODESIGN_CERTIFICATE_PATH -Force
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: YTM Tray ${{ env.YTM_WINDOWS_TRAY_VERSION }}
          generate_release_notes: true
          previous_tag: ${{ env.PREVIOUS_WINDOWS_TRAY_TAG }}
          make_latest: false
          files: |
            apps/windows-tray/.build/packages/*.zip
            apps/windows-tray/.build/update-manifest/*.json
