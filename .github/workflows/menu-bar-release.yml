name: Menu Bar Release

on:
  push:
    tags:
      - "menu-bar-v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve menu bar release version
        run: |
          version="${GITHUB_REF_NAME#menu-bar-v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Menu bar releases must use menu-bar-vX.Y.Z tags."
            exit 1
          fi
          IFS=. read -r major minor patch <<< "$version"
          build_number=$((major * 1000000 + minor * 1000 + patch))
          previous_tag="$(git tag -l 'menu-bar-v[0-9]*' --sort=-v:refname | \
            grep -v "^${GITHUB_REF_NAME}$" | head -n 1)"
          {
            echo "YTM_MENU_BAR_VERSION=$version"
            echo "YTM_MENU_BAR_BUILD_NUMBER=$build_number"
            echo "PREVIOUS_MENU_BAR_TAG=$previous_tag"
          } >> "$GITHUB_ENV"

      - name: Run menu bar tests
        run: pnpm exec vitest run tests/apps/menu-bar-scaffold.test.ts

      - name: Import Developer ID certificates
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_INSTALLER_P12_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_P12_BASE64 }}
        run: |
          keychain="$RUNNER_TEMP/developer-id-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"

          printf "%s" "$DEVELOPER_ID_APPLICATION_P12_BASE64" | \
            base64 --decode > "$RUNNER_TEMP/developer-id-application.p12"
          printf "%s" "$DEVELOPER_ID_INSTALLER_P12_BASE64" | \
            base64 --decode > "$RUNNER_TEMP/developer-id-installer.p12"

          security import "$RUNNER_TEMP/developer-id-application.p12" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security import "$RUNNER_TEMP/developer-id-installer.p12" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s \
            "$keychain" \
            "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -d user -s "$keychain"

          app_identity="$(security find-identity -v -p codesigning "$keychain" | \
            sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          installer_identity="$(security find-identity -v -p basic "$keychain" | \
            sed -n 's/.*"\(Developer ID Installer:.*\)"/\1/p' | head -n 1)"
          if [ -z "$app_identity" ]; then
            echo "::error::Developer ID Application identity was not imported."
            exit 1
          fi
          if [ -z "$installer_identity" ]; then
            echo "::error::Developer ID Installer identity was not imported."
            exit 1
          fi
          {
            echo "DEVELOPER_ID_APPLICATION=$app_identity"
            echo "DEVELOPER_ID_INSTALLER=$installer_identity"
          } >> "$GITHUB_ENV"

      - name: Write notarization key
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | \
            base64 --decode > "$key_path"
          {
            echo "APP_STORE_CONNECT_PRIVATE_KEY=$key_path"
            echo "APP_STORE_CONNECT_KEY_ID=$APP_STORE_CONNECT_KEY_ID"
            echo "APP_STORE_CONNECT_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID"
          } >> "$GITHUB_ENV"

      - name: Build direct app
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          pnpm run menu-bar:build:app -- \
            --channel=direct \
            --require-sparkle-public-key

      - name: Notarize direct app
        run: |
          pnpm run menu-bar:notarize -- \
            --path="apps/menu-bar/.build/release-apps/direct/YTM Menu Bar.app"

      - name: Build direct package
        run: |
          pnpm run menu-bar:package:direct -- \
            --app="apps/menu-bar/.build/release-apps/direct/YTM Menu Bar.app"

      - name: Notarize direct package
        run: |
          pnpm run menu-bar:notarize -- \
            --path="apps/menu-bar/.build/packages/YTM-Menu-Bar-${YTM_MENU_BAR_VERSION}.pkg"

      - name: Build Homebrew app
        run: pnpm run menu-bar:build:app -- --channel=homebrew

      - name: Notarize Homebrew app
        run: |
          pnpm run menu-bar:notarize -- \
            --path="apps/menu-bar/.build/release-apps/homebrew/YTM Menu Bar.app"

      - name: Build Homebrew package
        run: |
          pnpm run menu-bar:package:homebrew -- \
            --app="apps/menu-bar/.build/release-apps/homebrew/YTM Menu Bar.app"

      - name: Notarize Homebrew package
        run: |
          pnpm run menu-bar:notarize -- \
            --path="apps/menu-bar/.build/packages/YTM-Menu-Bar-Homebrew-${YTM_MENU_BAR_VERSION}.pkg"

      - name: Create Sparkle archive
        run: |
          mkdir -p apps/menu-bar/.build/sparkle
          ditto -c -k --sequesterRsrc --keepParent \
            "apps/menu-bar/.build/release-apps/direct/YTM Menu Bar.app" \
            "apps/menu-bar/.build/sparkle/YTM-Menu-Bar-${GITHUB_REF_NAME#menu-bar-v}.zip"

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_ED_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_ED_KEY_BASE64 }}
        run: |
          printf "%s" "$SPARKLE_PRIVATE_ED_KEY_BASE64" | base64 --decode > sparkle_ed_private_key
          SIGN_UPDATE="apps/menu-bar/.build/artifacts/sparkle/Sparkle/bin/sign_update"
          if [ ! -x "$SIGN_UPDATE" ]; then
            SIGN_UPDATE="$(find apps/menu-bar/.build \
              -path '*/bin/sign_update' \
              ! -path '*/old_dsa_scripts/*' \
              -type f | head -n 1)"
          fi
          SIGN_OUTPUT="$("$SIGN_UPDATE" --ed-key-file sparkle_ed_private_key "apps/menu-bar/.build/sparkle/YTM-Menu-Bar-${GITHUB_REF_NAME#menu-bar-v}.zip")"
          ED_SIGNATURE="$(printf "%s\n" "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          pnpm run menu-bar:appcast -- \
            --archive="apps/menu-bar/.build/sparkle/YTM-Menu-Bar-${GITHUB_REF_NAME#menu-bar-v}.zip" \
            --ed-signature="$ED_SIGNATURE" \
            --output="apps/menu-bar/.build/appcast/menu-bar/appcast.xml"

      - name: Generate Homebrew cask
        run: |
          pnpm run menu-bar:cask -- \
            --package="apps/menu-bar/.build/packages/YTM-Menu-Bar-Homebrew-${GITHUB_REF_NAME#menu-bar-v}.pkg" \
            --output="apps/menu-bar/.build/homebrew/Casks/ytm-menu-bar.rb"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: YTM Menu Bar ${{ env.YTM_MENU_BAR_VERSION }}
          generate_release_notes: true
          previous_tag: ${{ env.PREVIOUS_MENU_BAR_TAG }}
          make_latest: false
          files: |
            apps/menu-bar/.build/packages/*.pkg
            apps/menu-bar/.build/sparkle/*.zip
            apps/menu-bar/.build/appcast/menu-bar/appcast.xml

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/menu-bar/.build/appcast

      - name: Deploy appcast to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v5

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: gormanity/homebrew-tap
          path: homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Update Homebrew cask
        run: |
          mkdir -p homebrew-tap/Casks
          cp apps/menu-bar/.build/homebrew/Casks/ytm-menu-bar.rb \
            homebrew-tap/Casks/ytm-menu-bar.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ytm-menu-bar.rb
          git commit -m "Update ytm-menu-bar to ${GITHUB_REF_NAME#menu-bar-v}"
          git push
