name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox msedge

      - name: Resolve extension release metadata
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Extension releases must use vX.Y.Z tags."
            exit 1
          fi
          previous_tag="$(git tag -l 'v[0-9]*' --sort=-v:refname | \
            grep -v "^${GITHUB_REF_NAME}$" | head -n 1)"
          {
            echo "YTM_EXTENSION_VERSION=$version"
            echo "PREVIOUS_EXTENSION_TAG=$previous_tag"
          } >> "$GITHUB_ENV"

      - name: Run checks
        run: pnpm run check

      - name: Build and package
        run: pnpm run package

      - name: Firefox add-on lint
        run: pnpm run lint:addons:firefox:zip:built

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: YTM Enhancer ${{ env.YTM_EXTENSION_VERSION }}
          generate_release_notes: true
          previous_tag: ${{ env.PREVIOUS_EXTENSION_TAG }}
          make_latest: true
          files: releases/*.zip
