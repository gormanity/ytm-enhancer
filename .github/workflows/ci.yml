name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install actionlint
        run: |
          mkdir -p "$HOME/.local/bin"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: pnpm run workflow:check

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Dead CSS check
        run: pnpm run css:dead

      - name: Data role check
        run: pnpm run data-role:check

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build Chrome
        run: pnpm run build:chrome

      - name: Build Firefox
        run: pnpm run build:firefox

      - name: Firefox add-on lint
        run: pnpm run lint:addons:firefox:dist

      - name: Build Edge
        run: pnpm run build:edge
